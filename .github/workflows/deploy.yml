name: Deploy to Railway

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # manual trigger

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest  # lint/test tools
    
    - name: Lint with Ruff
      run: |
        ruff check .
    
    - name: Run tests
      env:
        DJANGO_SECRET_KEY: dummy
        DJANGO_DEBUG: True
        DJANGO_ALLOWED_HOSTS: '*'
        DB_ENGINE: django.db.backends.sqlite3
      run: |
        python manage.py test
        # Assumes tests in core/tests.py; add pytest if more
        
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Railway CLI
      run: npm install -g @railway/cli@latest
    
    - name: Deploy to Railway
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}  # Optional: set in Railway dashboard
        RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}  # Optional
      run: |
        railway login
        railway link  # or specify project/service with vars above
        railway up

